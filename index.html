<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCUTTLE</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #04161e; }
      #app { width: 100%; height: 100%; }
      #app canvas { display: block; }
      #hud { display: none; }
      .panel { position: fixed; background: linear-gradient(180deg, rgba(8,22,28,0.78), rgba(4,12,16,0.85)); border: 1px solid rgba(212,160,23,0.35); border-radius: 8px; color: #cfe0d8; font: 12px/1.45 "Segoe UI", system-ui, sans-serif; padding: 10px 14px; user-select: none; pointer-events: none; box-shadow: 0 4px 18px rgba(0,0,0,0.45); }
      #ship-panel { left: 14px; bottom: 14px; min-width: 210px; }
      #ship-panel .speed { font: 700 30px/1 Georgia, serif; color: #e9e1cd; }
      #ship-panel .speed small { font-size: 13px; color: #9fc4d4; }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
      .lbl { color: #8aa8b0; min-width: 52px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .bar { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
      .bar > div { height: 100%; background: #2e8b9e; border-radius: 4px; width: 0%; transition: width 0.2s; }
      .bar.flood > div { background: #3a7ec2; }
      .bar.hp > div { background: #b03a2e; }
      .bar.rudder { position: relative; overflow: visible; }
      .bar.rudder::after { content: ""; position: absolute; left: 50%; top: -2px; bottom: -2px; width: 1px; background: rgba(207,224,216,0.5); }
      .bar.rudder > div { position: absolute; top: -1px; width: 10px; height: 10px; left: 50%; transform: translateX(-50%); background: #e3b341; border-radius: 3px; transition: left 0.1s linear; }
      #gun-panel { right: 14px; bottom: 14px; min-width: 190px; text-align: center; }
      #gun-status { font: 700 22px/1.1 Georgia, serif; color: #e3b341; letter-spacing: 0.08em; }
      #gun-status.ready { color: #7ec97e; }
      #gun-sub { color: #8aa8b0; font-size: 11px; margin-top: 4px; }
      #gold-panel { right: 14px; top: 14px; font: 700 18px Georgia, serif; color: #e3b341; }
      #compass { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); width: 92px; height: 92px; pointer-events: none; }
      #compass .ring { position: absolute; inset: 0; border-radius: 50%; background: radial-gradient(circle, rgba(8,22,28,0.72) 58%, rgba(8,22,28,0.88)); border: 1px solid rgba(212,160,23,0.4); }
      #compass .rose { position: absolute; inset: 6px; border-radius: 50%; transition: transform 0.1s linear; }
      #compass .rose .n { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); color: #e3b341; font: 700 13px Georgia, serif; }
      #compass .rose .pt { position: absolute; color: #cfe0d8; font: 700 11px Georgia, serif; }
      #compass .rose .e { top: 50%; right: 3px; transform: translateY(-50%); }
      #compass .rose .s { bottom: 2px; left: 50%; transform: translateX(-50%); }
      #compass .rose .w { top: 50%; left: 3px; transform: translateY(-50%); }
      #compass .tick { position: absolute; left: 50%; top: 50%; width: 2px; height: 7px; background: rgba(207,224,216,0.45); transform-origin: 1px 0; margin-left: -1px; }
      #hdg { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #e9e1cd; font: 700 14px Georgia, serif; text-shadow: 0 1px 4px #000; }
      #underwater { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.25s; background: radial-gradient(ellipse at center, rgba(12,58,68,0.45), rgba(5,30,38,0.75)); }
      #compass .marker { position: absolute; left: 50%; top: 50%; width: 0; height: 0; transform-origin: 0 0; }
      #compass .marker .dot { position: absolute; left: -4px; top: -38px; width: 8px; height: 8px; border-radius: 50%; }
      #compass .enemy .dot { background: #d64541; box-shadow: 0 0 6px #d64541; }
      #compass .wind .dot { background: #58c4d4; width: 0; height: 0; border-radius: 0; border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 9px solid #58c4d4; left: -5px; }
      #toast { position: fixed; bottom: 118px; left: 50%; transform: translateX(-50%); color: #e9e1cd; font: 600 15px Georgia, serif; text-shadow: 0 1px 8px #000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
      #hints { position: fixed; bottom: 4px; left: 50%; transform: translateX(-50%); color: rgba(207,224,216,0.55); font: 11px monospace; pointer-events: none; white-space: pre; }
      #banner { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: #e8e0cc; font: 700 42px/1.3 Georgia, serif; text-shadow: 0 2px 18px #000; background: radial-gradient(ellipse at center, rgba(2,18,24,0.25), rgba(2,18,24,0.78)); user-select: none; }
      #banner small { font: 400 16px monospace; color: #9fc4d4; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="ship-panel" class="panel">
      <div class="speed"><span id="spd">0.0</span> <small>kn</small></div>
      <div class="row"><span class="lbl">Sails</span><div class="bar"><div id="sails-bar"></div></div></div>
      <div class="row"><span class="lbl">Rudder</span><div class="bar rudder"><div id="rudder-ind"></div></div></div>
      <div class="row"><span class="lbl">Flood</span>
        <div class="bar flood"><div id="fl0"></div></div>
        <div class="bar flood"><div id="fl1"></div></div>
        <div class="bar flood"><div id="fl2"></div></div>
      </div>
      <div class="row"><span class="lbl">Crew</span><span id="crew-line">planks 8 · pump off</span></div>
      <div class="row" id="hp-row" style="display:none"><span class="lbl">Health</span><div class="bar hp"><div id="hp-bar"></div></div></div>
    </div>
    <div id="gun-panel" class="panel">
      <div id="gun-status">READY</div>
      <div class="bar" style="margin-top:6px"><div id="gun-bar" style="background:#e3b341"></div></div>
      <div id="gun-sub">elevation 4.0°</div>
    </div>
    <div id="gold-panel" class="panel">⛀ <span id="gold">0</span></div>
    <div id="compass">
      <div class="ring"></div>
      <div class="rose" id="rose">
        <div class="n">N</div>
        <div class="pt e">E</div>
        <div class="pt s">S</div>
        <div class="pt w">W</div>
        <div class="tick" style="transform: rotate(45deg) translateY(-38px)"></div>
        <div class="tick" style="transform: rotate(135deg) translateY(-38px)"></div>
        <div class="tick" style="transform: rotate(225deg) translateY(-38px)"></div>
        <div class="tick" style="transform: rotate(315deg) translateY(-38px)"></div>
      </div>
      <div id="hdg">0°</div>
      <div class="marker enemy" id="enemy-marker"><div class="dot"></div></div>
      <div class="marker wind" id="wind-marker"><div class="dot"></div></div>
    </div>
    <div id="underwater"></div>
    <div id="toast"></div>
    <div id="hints"></div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
